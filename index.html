<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethic Hawks | Forensic Governance</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            background: #1a237e; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        button:hover { background: #4a148c; }
    </style>
</head>
<body>
    <h1>⚖️ Ethic Hawks</h1>
    <h2>Forensic Governance & Risk Architecture</h2>
    
    <!-- Your EH Button -->
    <button id="eh-button" onclick="handleEHClick()">
        Click Me - EH Assistant
    </button>
    
    <p id="status"></p>

    <script>
        function handleEHClick() {
            document.getElementById('status').innerHTML = '✅ EH Button is working!';
            alert('Ethic Hawks Assistant activated!');
        }
        
        // Also add event listener as backup
        document.getElementById('eh-button').addEventListener('click', function() {
            console.log('EH Button clicked via event listener');
        });
        
        console.log('Ethic Hawks page loaded successfully');
    </script>
</body>
</html>
